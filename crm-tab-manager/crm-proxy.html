<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #12141a; }

    #crm-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Shown only when iframe is blocked by X-Frame-Options / CSP */
    #fallback {
      display: none;
      position: fixed;
      inset: 0;
      background: #12141a;
      color: #d8ddf0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }
    #fallback h2 { font-size: 16px; font-weight: 600; }
    #fallback p  { font-size: 13px; color: #7880a0; max-width: 440px; }
    #fallback a  {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 20px;
      background: #4a8fe8;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <iframe id="crm-frame" allowfullscreen></iframe>

  <div id="fallback">
    <h2>Cannot embed this page</h2>
    <p>
      The CRM blocks embedding via <code>X-Frame-Options</code> or
      <code>Content-Security-Policy</code>. Open it directly instead.
    </p>
    <a id="fallback-link" href="#" target="_blank" rel="noopener">Open CRM in new tab</a>
  </div>

  <script>
    (function () {
      // Read interactionId and target URL from query params
      var params  = new URLSearchParams(location.search);
      var iid     = params.get('interactionId') || '';
      var crmUrl  = params.get('url') || '';
      var tabTitle = params.get('title') || '';
      // Embedded mode: this proxy runs as an in-window iframe of the Tab Manager
      // (Chrome path). Nested-iframe visibility is inherited from the top-level
      // window, so EVERY embedded proxy would fire visibilitychange together when
      // the Tab Manager window regains focus. Switching is driven directly by the
      // Tab Manager's in-window tab strip instead, so we suppress TAB_FOCUSED here.
      var embedded = params.get('embedded') === '1';

      document.title = tabTitle || (iid ? ('CRM \u2014 ' + iid.slice(0, 8)) : 'CRM');

      var frame    = document.getElementById('crm-frame');
      var fallback = document.getElementById('fallback');
      var fbLink   = document.getElementById('fallback-link');

      if (crmUrl) {
        fbLink.href = crmUrl;
        frame.src   = crmUrl;

        // Detect iframe load failure (X-Frame-Options / CSP blocks trigger an error
        // or load a blank page — we use a timeout heuristic for the blank-page case).
        frame.addEventListener('error', showFallback);
        // Secondary heuristic: if the frame src doesn't change within 5 s and
        // contentDocument is inaccessible (cross-origin block), show fallback.
        // Most X-Frame-Options blocks cause 'error' immediately; CSP 'frame-ancestors'
        // causes the browser to show a built-in error page inside the frame which we
        // cannot detect — the open-in-new-tab fallback is the best UX in that case.
      } else {
        showFallback();
      }

      function showFallback() {
        frame.style.display = 'none';
        fallback.style.display = 'flex';
      }

      // ── BroadcastChannel: notify Tab Manager when this tab is focused ─────
      var channel;
      try {
        channel = new BroadcastChannel('crm-tab-focus');
      } catch (e) {
        // BroadcastChannel not available (should not happen in modern browsers)
        channel = null;
      }

      // Report TAB_FOCUSED ONLY on a genuine tab switch — i.e. a visibility
      // transition from hidden → visible. This is the single unambiguous signal
      // that the user (or a programmatic focus) brought THIS tab to the front.
      //
      // We deliberately do NOT listen for the window `focus` event: it fires
      // whenever the browser window regains OS focus (e.g. the agent alt-tabs
      // back, or the Tab Manager's windowRef.focus() shifts OS focus) WITHOUT
      // the visible tab actually changing. Those spurious signals reported a
      // stale interaction id and re-drove the Desktop⇄CRM selection loop.
      //
      // We also do NOT fire an initial "already visible" probe: a freshly opened
      // tab is focused by the Tab Manager itself, so no echo is needed.
      var _notifyTimer = null;
      function notifyFocused() {
        if (!iid || !channel) return;
        if (_notifyTimer) return; // coalesce bursts into one message
        _notifyTimer = setTimeout(function () {
          _notifyTimer = null;
          channel.postMessage({ type: 'TAB_FOCUSED', interactionId: iid });
        }, 50);
      }

      // visibilitychange → visible fires only on an actual transition to the
      // foreground, which is exactly the genuine tab-switch signal we want.
      // Skipped entirely in embedded mode (see note above).
      if (!embedded) {
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') {
            notifyFocused();
          }
        });
      }
    })();
  </script>
</body>
</html>
